# fly.toml app configuration file generated for ip-tracker on 2025-08-05T00:08:21Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ip-tracker'
primary_region = 'sin'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
